      ],
      "expected": {"changed_paths": {"any": ["reports/subagent-exploration.md"]}, "stop_reason": "final_answer_returned"},
      "metadata": {"source": "pico-inspired-synthetic", "contamination_risk": "low", "issue_clarity": "clear", "test_coverage": "high", "coverage_note": "requires Explore subagent session events and read-only evidence"}
