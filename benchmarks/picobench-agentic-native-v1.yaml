      "title": "Native two-pass resume continuity",
      "suite": "picobench-agentic-native",
      "category": "resume",
      "repo": {"fixture": "tests/fixtures/picobench/agentic_smoke"},
      "prompt": {"text": "继续上一次任务。读取 reports/resume-plan.md，然后创建 reports/resume-result.md，内容必须包含 two-pass resume complete 和 checkpoint continuity。最后返回 final。"},
      "resume": {
        "first_prompt": "创建 reports/resume-plan.md，内容包含 checkpoint continuity、next step 和 reports/resume-result.md。只做计划文件，然后 final。",
        "resume_prompt": "继续上一次任务。读取 reports/resume-plan.md，然后创建 reports/resume-result.md，内容必须包含 two-pass resume complete 和 checkpoint continuity。最后返回 final。",
        "first_max_steps": 8,
        "resume_max_steps": 10
      },
      "execution": {"driver": "resume_cli", "approval": "auto", "sandbox": "best_effort", "max_steps": 10, "timeout_sec": 420},
      "tests": {"public": ["python -c \"from pathlib import Path; plan=Path('reports/resume-plan.md'); result=Path('reports/resume-result.md'); assert plan.exists(); text=result.read_text(encoding='utf-8').lower(); assert 'two-pass resume complete' in text and 'checkpoint continuity' in text\""]},
      "verifiers": [
        {"type": "evidence"},
        {"type": "artifact_exists", "paths": ["reports/resume-plan.md", "reports/resume-result.md"]},
        {"type": "changed_paths", "any": ["reports/resume-result.md"]}
      ],
      "expected": {"changed_paths": {"any": ["reports/resume-result.md"]}, "stop_reason": "final_answer_returned"},
      "metadata": {"source": "pico-inspired-synthetic", "contamination_risk": "low", "issue_clarity": "clear", "test_coverage": "high", "coverage_note": "uses PicoBench resume_cli driver to run first pass and second pass with --resume latest"}
    },
