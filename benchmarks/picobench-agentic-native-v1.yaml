      "execution": {"driver": "one_shot_cli", "approval": "auto", "sandbox": "best_effort", "max_steps": 16, "timeout_sec": 420},
      "tests": {"public": ["python -c \"from pathlib import Path; text=Path('reports/subagent-exploration.md').read_text(encoding='utf-8').lower(); assert 'explore subagent complete' in text and 'readme.md' in text\""]},
