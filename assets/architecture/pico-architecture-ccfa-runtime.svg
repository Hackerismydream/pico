<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1360" viewBox="0 0 2200 1360" role="img" aria-label="Pico CCFA runtime architecture">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity=".08"/></filter>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto"><path d="M0 0L16 8L0 16z" fill="#334155"/></marker>
    <style>
      text{font-family:"SF Pro Text","Inter","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .title{font-size:38px;font-weight:760}.sub{font-size:20px;font-weight:520;fill:#64748b}.h{font-size:28px;font-weight:760}.b{font-size:19px;font-weight:520;fill:#475569}.code{font-size:16px;font-weight:650;fill:#334155}.n{font-size:19px;font-weight:780;fill:white}.tag{font-size:15px;font-weight:700;letter-spacing:.4px;fill:#64748b}
      .card{fill:#fff;stroke:#CBD5E1;stroke-width:2.4}.core{fill:#F8FAFC;stroke:#111827;stroke-width:3.6}.pill{fill:#F8FAFC;stroke:#CBD5E1;stroke-width:1.8}
      .teal{fill:#0f766e}.blue{fill:#2563eb}.orange{fill:#ea580c}.green{fill:#15803d}
    </style>
  </defs>
  <rect width="2200" height="1360" fill="#F8FAFC"/>
  <path d="M140 170H2060M140 1110H2060M140 170V1110M2060 170V1110" stroke="#E2E8F0" stroke-width="2"/>
  <text x="1100" y="90" text-anchor="middle" class="title">Pico Runtime Architecture</text>
  <text x="1100" y="126" text-anchor="middle" class="sub">CCFA style: control plane in the center, dependencies around it, code anchors only where useful.</text>

  <g filter="url(#shadow)">
    <rect x="820" y="440" width="560" height="330" rx="18" class="core"/>
    <rect x="820" y="440" width="560" height="10" rx="5" class="teal"/>
    <circle cx="880" cy="500" r="25" class="teal"/><text x="880" y="507" text-anchor="middle" class="n">3</text>
    <text x="930" y="512" class="h">Pico.ask() Control Loop</text>
    <text x="875" y="575" class="b">One request becomes repeated model decisions.</text>
    <text x="875" y="617" class="b">build prompt -> call model -> parse -> act or finish</text>
    <rect x="875" y="665" width="450" height="38" rx="8" class="pill"/>
    <text x="1100" y="690" text-anchor="middle" class="code">runtime.py :: Pico.ask()</text>
    <rect x="875" y="720" width="450" height="32" rx="7" fill="#fff" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="1100" y="742" text-anchor="middle" class="code">history + task_state + trace/report</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="285" width="430" height="220" rx="16" class="card"/>
    <rect x="220" y="285" width="8" height="220" rx="4" class="teal"/>
    <circle cx="275" cy="345" r="24" class="teal"/><text x="275" y="352" text-anchor="middle" class="n">1</text>
    <text x="325" y="355" class="h">Bootstrap</text>
    <text x="260" y="412" class="b">CLI resolves runtime options.</text>
    <text x="260" y="450" class="b">provider, cwd, approval, resume</text>
    <rect x="260" y="468" width="340" height="30" rx="7" class="pill"/><text x="430" y="489" text-anchor="middle" class="code">cli.build_agent()</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="220" y="675" width="430" height="220" rx="16" class="card"/>
    <rect x="220" y="675" width="8" height="220" rx="4" class="teal"/>
    <circle cx="275" cy="735" r="24" class="teal"/><text x="275" y="742" text-anchor="middle" class="n">2</text>
    <text x="325" y="745" class="h">Workspace Snapshot</text>
    <text x="260" y="802" class="b">Small repo baseline, not a scan.</text>
    <text x="260" y="840" class="b">cwd, repo_root, git, docs</text>
    <rect x="260" y="858" width="340" height="30" rx="7" class="pill"/><text x="430" y="879" text-anchor="middle" class="code">WorkspaceContext</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1550" y="250" width="430" height="220" rx="16" class="card"/>
    <rect x="1550" y="250" width="8" height="220" rx="4" class="blue"/>
    <circle cx="1605" cy="310" r="24" class="blue"/><text x="1605" y="317" text-anchor="middle" class="n">4</text>
    <text x="1655" y="320" class="h">Context Pack</text>
    <text x="1590" y="377" class="b">Assemble what the model sees.</text>
    <text x="1590" y="415" class="b">prefix, memory, history, request</text>
    <rect x="1590" y="433" width="340" height="30" rx="7" class="pill"/><text x="1760" y="454" text-anchor="middle" class="code">ContextManager.build()</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1550" y="570" width="430" height="220" rx="16" class="card"/>
    <rect x="1550" y="570" width="8" height="220" rx="4" class="orange"/>
    <circle cx="1605" cy="630" r="24" class="orange"/><text x="1605" y="637" text-anchor="middle" class="n">5</text>
    <text x="1655" y="640" class="h">Tool Gate</text>
    <text x="1590" y="697" class="b">All external actions pass here.</text>
    <text x="1590" y="735" class="b">args, path, approval, repeat guard</text>
    <rect x="1590" y="753" width="340" height="30" rx="7" class="pill"/><text x="1760" y="774" text-anchor="middle" class="code">run_tool() + Registry</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1550" y="890" width="430" height="220" rx="16" class="card"/>
    <rect x="1550" y="890" width="8" height="220" rx="4" class="green"/>
    <circle cx="1605" cy="950" r="24" class="green"/><text x="1605" y="957" text-anchor="middle" class="n">6</text>
    <text x="1655" y="960" class="h">State and Recovery</text>
    <text x="1590" y="1017" class="b">Continuation and audit trail.</text>
    <text x="1590" y="1055" class="b">memory, session, task_state, trace</text>
    <rect x="1590" y="1073" width="340" height="30" rx="7" class="pill"/><text x="1760" y="1094" text-anchor="middle" class="code">LayeredMemory / RunStore</text>
  </g>

  <path d="M650 395C720 430 760 485 810 545" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M650 785C720 755 760 700 810 650" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1380 570C1455 510 1490 425 1540 365" stroke="#2563eb" stroke-width="4" fill="none" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
  <path d="M1380 665H1540" stroke="#ea580c" stroke-width="4" fill="none" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
  <path d="M1380 735C1465 775 1500 910 1540 995" stroke="#15803d" stroke-width="4" fill="none" stroke-dasharray="9 8" marker-end="url(#arrow)"/>

  <text x="220" y="1148" class="tag">READING ORDER</text>
  <text x="220" y="1182" class="b">1 -> 2 start the runtime. 3 owns the control loop. 4/5/6 are dependencies the loop uses every round.</text>
</svg>
