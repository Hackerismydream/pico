<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1360" viewBox="0 0 2200 1360" role="img" aria-label="Pico CCFA compact architecture">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto"><path d="M0 0L16 8L0 16z" fill="#111827"/></marker>
    <style>
      text{font-family:"SF Mono","Menlo","PingFang SC","Microsoft YaHei",monospace;fill:#111827}
      .title{font-size:34px;font-weight:800}.sub{font-size:18px;font-weight:500;fill:#64748b}.h{font-size:24px;font-weight:800}.b{font-size:17px;font-weight:500;fill:#475569}.code{font-size:15px;font-weight:650;fill:#334155}.n{font-size:18px;font-weight:900;fill:#fff}
      .box{fill:#fff;stroke:#111827;stroke-width:2.4}.soft{fill:#F8FAFC;stroke:#CBD5E1;stroke-width:2}.pill{fill:#F8FAFC;stroke:#CBD5E1;stroke-width:1.4}
      .teal{fill:#0f766e}.blue{fill:#2563eb}.orange{fill:#ea580c}.green{fill:#15803d}
    </style>
  </defs>
  <rect width="2200" height="1360" fill="#F8FAFC"/>
  <text x="1100" y="86" text-anchor="middle" class="title">pico / architecture</text>
  <text x="1100" y="120" text-anchor="middle" class="sub">compact CCFA map: six boxes, one control loop, three runtime boundaries</text>

  <rect x="210" y="190" width="1780" height="210" rx="10" class="soft"/>
  <text x="250" y="245" class="sub">startup path</text>
  <g>
    <rect x="300" y="280" width="380" height="78" rx="8" class="box"/><circle cx="335" cy="319" r="21" class="teal"/><text x="335" y="326" text-anchor="middle" class="n">1</text><text x="375" y="312" class="h">cli/bootstrap</text><text x="375" y="340" class="code">build_agent()</text>
  </g>
  <path d="M680 319H820" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <g>
    <rect x="840" y="280" width="430" height="78" rx="8" class="box"/><circle cx="875" cy="319" r="21" class="teal"/><text x="875" y="326" text-anchor="middle" class="n">2</text><text x="915" y="312" class="h">workspace snapshot</text><text x="915" y="340" class="code">cwd/git/docs/fingerprint</text>
  </g>
  <path d="M1270 319H1410" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <g>
    <rect x="1430" y="260" width="420" height="118" rx="8" class="box"/><circle cx="1468" cy="319" r="21" class="teal"/><text x="1468" y="326" text-anchor="middle" class="n">3</text><text x="1510" y="302" class="h">Pico.ask()</text><text x="1510" y="334" class="code">prompt -> model -> parse</text><text x="1510" y="362" class="code">tool / retry / final</text>
  </g>

  <rect x="210" y="500" width="1780" height="520" rx="10" class="soft"/>
  <text x="250" y="555" class="sub">runtime boundaries used by the control loop</text>
  <g>
    <rect x="310" y="650" width="450" height="220" rx="10" class="box"/><rect x="310" y="650" width="450" height="8" class="blue"/><circle cx="360" cy="710" r="24" class="blue"/><text x="360" y="718" text-anchor="middle" class="n">4</text><text x="410" y="720" class="h">context</text><text x="350" y="775" class="b">model-visible state</text><text x="350" y="815" class="code">prefix + memory + history + request</text><rect x="350" y="842" width="360" height="30" rx="7" class="pill"/><text x="530" y="863" text-anchor="middle" class="code">ContextManager.build()</text>
  </g>
  <g>
    <rect x="875" y="650" width="450" height="220" rx="10" class="box"/><rect x="875" y="650" width="450" height="8" class="orange"/><circle cx="925" cy="710" r="24" class="orange"/><text x="925" y="718" text-anchor="middle" class="n">5</text><text x="975" y="720" class="h">tool gate</text><text x="915" y="775" class="b">external actions</text><text x="915" y="815" class="code">validate + approve + execute</text><rect x="915" y="842" width="360" height="30" rx="7" class="pill"/><text x="1095" y="863" text-anchor="middle" class="code">run_tool() + registry</text>
  </g>
  <g>
    <rect x="1440" y="650" width="450" height="220" rx="10" class="box"/><rect x="1440" y="650" width="450" height="8" class="green"/><circle cx="1490" cy="710" r="24" class="green"/><text x="1490" y="718" text-anchor="middle" class="n">6</text><text x="1540" y="720" class="h">state</text><text x="1480" y="775" class="b">continuation + audit</text><text x="1480" y="815" class="code">memory + session + trace + report</text><rect x="1480" y="842" width="360" height="30" rx="7" class="pill"/><text x="1660" y="863" text-anchor="middle" class="code">LayeredMemory / RunStore</text>
  </g>
  <path d="M1640 378C1640 455 530 520 530 640" stroke="#2563eb" stroke-width="4" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1640 378C1640 520 1100 520 1100 640" stroke="#ea580c" stroke-width="4" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1640 378C1640 455 1660 520 1660 640" stroke="#15803d" stroke-width="4" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>

  <rect x="550" y="1120" width="1100" height="66" rx="10" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1100" y="1162" text-anchor="middle" class="b">Minimal read: 1/2 create the run, 3 schedules it, 4/5/6 bound what the model can see, do, and remember.</text>
</svg>
